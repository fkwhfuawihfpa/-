<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課堂教具 | 文武雙全</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#ffd700;--blue:#3a86ff;--teal:#4ecdc4;--red:#ff6b6b;--green:#2ecc71;--bg:#0d0d1a;--card:#1e1e40;--border:rgba(255,255,255,0.1);--muted:#888;--radius:16px;--text:#fff;--text2:#ccc;--nav-bg:rgba(13,13,26,0.97);}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,textarea{font-family:inherit;outline:none;}
.hidden{display:none!important;}
/* ── 背景 Canvas 層 ─────────────────────── */
#bgCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity 0.6s;}
nav,.page-wrap{position:relative;z-index:1;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity 0.6s;
  background:
    radial-gradient(ellipse 55% 45% at 80% 10%, rgba(255,215,0,0.10) 0%, transparent 67%),
    radial-gradient(ellipse 50% 40% at 20% 85%, rgba(58,134,255,0.10) 0%, transparent 62%),
    radial-gradient(ellipse 42% 35% at 50% 50%, rgba(78,205,196,0.06) 0%, transparent 55%);}
body::after{content:'';position:fixed;inset:-10% -10% -5% -10%;z-index:0;pointer-events:none;
  background:
    conic-gradient(from 80deg at 75% 15%, rgba(255,215,0,0.12), transparent 40%),
    conic-gradient(from -60deg at 20% 80%, rgba(58,134,255,0.12), transparent 45%),
    radial-gradient(55% 40% at 50% 50%, rgba(78,205,196,0.05), transparent 60%);
  filter:blur(42px) saturate(120%);
  animation:auroraShift 18s ease-in-out infinite alternate;
  transition:opacity 0.6s;}
@keyframes auroraShift{0%{transform:translate3d(0,0,0) rotate(0deg);}50%{transform:translate3d(1.5%,-1.5%,0) rotate(2deg);}100%{transform:translate3d(-1%,1%,0) rotate(-2deg);}}
.bg-noise body::before{background:radial-gradient(ellipse 70% 60% at 70% 20%, rgba(255,215,0,0.07) 0%, transparent 65%),radial-gradient(ellipse 55% 50% at 30% 80%, rgba(58,134,255,0.07) 0%, transparent 62%);}
.bg-noise body::after{opacity:0.5;}
.bg-noise #bgCanvas{opacity:0.9;}
.bg-mountain body::before{background:radial-gradient(ellipse 100% 60% at 50% 100%, rgba(0,30,60,0.95) 0%, transparent 70%),radial-gradient(ellipse 80% 50% at 50% 50%, rgba(10,20,40,0.5) 0%, transparent 100%);}
.bg-mountain body::after{background:radial-gradient(ellipse 80% 40% at 50% 95%, rgba(255,215,0,0.15) 0%, transparent 60%),conic-gradient(from 160deg at 50% 80%, rgba(78,205,196,0.12), transparent 30%);filter:blur(30px);animation:mountainGlow 8s ease-in-out infinite alternate;}
@keyframes mountainGlow{0%{opacity:0.7;}100%{opacity:1;}}
.bg-geo body::before{background:radial-gradient(ellipse 60% 50% at 80% 15%, rgba(255,215,0,0.10) 0%, transparent 70%),radial-gradient(ellipse 50% 40% at 20% 80%, rgba(58,134,255,0.09) 0%, transparent 65%),radial-gradient(ellipse 40% 35% at 50% 50%, rgba(78,205,196,0.04) 0%, transparent 60%);}
.bg-geo body::after{opacity:0.6;filter:blur(38px);}
body.light-mode #bgCanvas{opacity:0.55;filter:invert(1) hue-rotate(180deg) saturate(0.6) brightness(1.1);}
body.light-mode::before{
  opacity:1;
  background:
    radial-gradient(ellipse 65% 55% at 82% 15%, rgba(255,215,0,0.22) 0%, transparent 68%),
    radial-gradient(ellipse 55% 45% at 18% 80%, rgba(58,134,255,0.16) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 50% 45%, rgba(78,205,196,0.10) 0%, transparent 60%);
}
body.light-mode::after{opacity:0.55;filter:blur(40px) saturate(160%) brightness(1.3);}
body.light-mode.bg-noise #bgCanvas{opacity:0.35;filter:none;}
body.light-mode.bg-mountain #bgCanvas{opacity:0.45;filter:none;}
body.light-mode.bg-mountain::before{
  background:
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(255,200,50,0.20) 0%, transparent 70%),
    radial-gradient(ellipse 80% 50% at 50% 50%, rgba(58,134,255,0.12) 0%, transparent 100%);
}
/* ── 背景切換器按鈕 ─────────────────────── */
.bg-switcher{display:flex;align-items:center;gap:4px;margin-left:6px;}
.bg-picker-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;flex-shrink:0;}
.bg-picker-btn:hover{transform:scale(1.18);box-shadow:0 0 8px rgba(255,255,255,0.3);}
.bg-picker-btn.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.5);}
.bg-picker-btn[data-bg="star"]{background:radial-gradient(circle at 40% 35%, #3a86ff 0%, #0d0d1a 70%);}
.bg-picker-btn[data-bg="geo"]{background:linear-gradient(135deg, #1e1e40 0%, #3a86ff 50%, #4ecdc4 100%);}
.bg-picker-btn[data-bg="noise"]{background:radial-gradient(circle, #c8a24a 0%, #3d2c08 60%, #1a1000 100%);}
.bg-picker-btn[data-bg="mountain"]{background:linear-gradient(to bottom, #0d0d1a 0%, #1a3050 55%, #3a86ff 100%);}
.bg-picker-btn::after{content:attr(data-label);position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;font-size:0.7rem;padding:3px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;}
.bg-picker-btn:hover::after{opacity:1;}
/* 自定義圖片背景 */
.bg-custom-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.bg-custom-panel{background:var(--card,#1e1e40);border:1px solid var(--border,rgba(255,255,255,0.12));border-radius:20px;padding:28px 28px 24px;width:min(480px,92vw);box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.bg-custom-panel h3{font-size:1rem;font-weight:800;color:var(--gold,#ffd700);margin-bottom:16px;}
.bg-upload-zone{border:2px dashed var(--border,rgba(255,255,255,0.18));border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
.bg-upload-zone:hover{border-color:rgba(58,134,255,0.6);background:rgba(58,134,255,0.05);}
.bg-upload-zone input{display:none;}
.bg-url-inp{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border,rgba(255,255,255,0.12));border-radius:10px;color:var(--text,#fff);font-size:0.88rem;padding:9px 13px;margin-bottom:10px;}
.bg-url-inp:focus{border-color:var(--blue,#3a86ff);outline:none;}
body.light-mode .bg-custom-panel{background:#fff;}
body.light-mode .bg-url-inp{color:#1a1a2e;background:rgba(0,0,0,0.05);}
body.bg-custom-img{background-size:cover;background-position:center;background-attachment:scroll;}
body.bg-custom-img::before{opacity:0.3!important;}
body.bg-custom-img::after{opacity:0.25!important;}
body.bg-custom-img #bgCanvas{opacity:0.15!important;}

/* LIGHT MODE */
body.light-mode{--bg:#f5f2e8;--card:#ffffff;--border:rgba(0,0,0,0.1);--muted:#555;--text:#1a1a2e;--text2:#444;--nav-bg:rgba(245,242,232,0.96);--gold:#d4a017;
  background:radial-gradient(ellipse 70% 55% at 85% 12%, rgba(255,215,0,0.18) 0%, transparent 65%),radial-gradient(ellipse 60% 50% at 12% 82%, rgba(58,134,255,0.12) 0%, transparent 65%),radial-gradient(ellipse 50% 45% at 50% 45%, rgba(78,205,196,0.08) 0%, transparent 60%),#f5f2e8;}
body.light-mode .nav-a{color:#555;}
body.light-mode .nav-a:hover{color:#000;background:rgba(0,0,0,0.06);}
body.light-mode .tab-btn{background:rgba(0,0,0,0.06);color:#555;}
body.light-mode .tab-btn.active{background:#d4a017;color:#fff;border-color:#d4a017;box-shadow:0 3px 12px rgba(212,160,23,0.40);}
body.light-mode .txt-area{color:#1a1a2e;background:rgba(0,0,0,0.05);}
body.light-mode .ntag{background:rgba(0,0,0,0.06);color:#555;}
body.light-mode .vote-opt-input{color:#1a1a2e;background:rgba(0,0,0,0.05);}
body.light-mode .t-pre{color:#333;background:rgba(0,0,0,0.06);}
/* light-mode 補丁 */
body.light-mode .ntag{background:rgba(0,0,0,0.06);color:#444;}
body.light-mode .drawn-name{color:#333;}
body.light-mode .vote-bar-bg{background:rgba(0,0,0,0.07);}
body.light-mode .class-list-item{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.08);}
body.light-mode .class-list-item:hover{background:rgba(212,160,23,0.08);}
body.light-mode .class-list-item.active-class{background:rgba(212,160,23,0.12);border-color:rgba(212,160,23,0.35);}
body.light-mode .class-list-name{color:#7a4f00;}
body.light-mode #classNameInput{color:#1a1a2e;background:rgba(0,0,0,0.05);}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;height:56px;gap:4px;transition:background 0.3s;}
.logo{font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:2px;margin-right:14px;white-space:nowrap;}
.nav-a{padding:7px 13px;border-radius:20px;font-size:0.83rem;font-weight:600;color:var(--muted);transition:all 0.2s;white-space:nowrap;}
.nav-a:hover{color:#fff;background:rgba(255,255,255,0.08);}
.nav-a.active{background:var(--gold);color:#000;}
.theme-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:1rem;color:var(--gold);transition:all 0.2s;margin-left:4px;}
.theme-btn:hover{background:rgba(255,215,0,0.12);}
.page-wrap{padding:72px 20px 40px;max-width:860px;margin:0 auto;}
.page-banner{margin-bottom:20px;}
.page-banner h1{font-size:1.6rem;font-weight:900;color:var(--gold);margin-bottom:4px;}
.page-banner p{color:var(--muted);font-size:0.88rem;}
.tab-nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.tab-btn{padding:9px 20px;border-radius:20px;font-size:0.88rem;font-weight:700;background:rgba(255,255,255,0.07);color:#ccc;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
.tab-btn.active{background:var(--gold);color:#000;border-color:var(--gold);}
.card-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.sec-title{font-size:0.92rem;font-weight:700;color:var(--gold);margin-bottom:12px;}
.txt-area{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:0.92rem;padding:10px 13px;resize:vertical;}
.txt-area:focus{border-color:var(--blue);}
.row-gap{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;}
.name-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.ntag{background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:14px;padding:3px 11px;font-size:0.8rem;color:#ccc;}
.ntag.drawn{opacity:0.2;text-decoration:line-through;}
.draw-box{background:rgba(0,0,0,0.45);border:2px solid rgba(255,215,0,0.3);border-radius:22px;padding:32px 20px;text-align:center;margin-bottom:14px;}
.draw-name{font-size:4rem;font-weight:900;min-height:80px;display:flex;align-items:center;justify-content:center;}
.draw-name.rolling{color:var(--gold);animation:dshake 0.08s infinite;}
@keyframes dshake{0%{transform:translateX(-3px)}50%{transform:translateX(3px)}100%{transform:translateX(-3px)}}
.draw-name.result{color:var(--gold);text-shadow:0 0 28px rgba(255,215,0,0.8);animation:dpop 0.4s ease;}
@keyframes dpop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.btn-draw{background:linear-gradient(135deg,#f7971e,#ffd200);color:#1a1a2e;font-size:1.2rem;font-weight:900;padding:13px 48px;border-radius:50px;box-shadow:0 6px 20px rgba(255,210,0,0.4);letter-spacing:3px;transition:all 0.15s;}
.btn-draw:hover{transform:translateY(-2px);}
.btn-draw:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.drawn-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.dtag{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.35);border-radius:14px;padding:3px 11px;font-size:0.82rem;color:var(--gold);animation:fin 0.3s ease;}
@keyframes fin{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
/* VOTE */
.vote-opt-input{flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:9px;color:#fff;font-size:0.92rem;padding:8px 12px;}
.vote-opt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.vote-btn{background:var(--blue);color:#fff;border-radius:10px;padding:8px 20px;font-weight:700;font-size:0.9rem;}
.vote-btn:hover{background:#2a76ef;}
.vote-btn:active{transform:scale(0.95);}
.v-bar-wrap{background:rgba(255,255,255,0.07);border-radius:7px;height:28px;overflow:hidden;flex:1;}
.v-bar{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width 0.5s;}
.v-count{min-width:36px;text-align:right;font-weight:700;color:var(--gold);}
/* TIMER */
.t-big{font-size:6rem;font-weight:900;letter-spacing:8px;transition:color 0.3s;margin:16px 0;}
.t-big.warn{color:var(--red);animation:tblink 0.5s infinite;}
@keyframes tblink{0%,100%{opacity:1}50%{opacity:0.4}}
.t-presets{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
.t-pre{padding:5px 13px;border-radius:7px;font-size:0.82rem;background:rgba(255,255,255,0.07);color:#ccc;border:1px solid var(--border);cursor:pointer;}
.t-pre:hover{background:rgba(255,255,255,0.14);}
.t-ctrl{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.t-btn{border-radius:10px;padding:11px 28px;font-weight:700;font-size:1rem;color:#fff;}
.t-start{background:var(--green);}
.t-pause{background:#f39c12;}
.t-stop{background:var(--red);}
.ni{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:7px;color:#fff;font-size:0.85rem;text-align:center;padding:5px;width:50px;}
/* general buttons */
.btn{cursor:pointer;border:none;font-family:inherit;border-radius:10px;padding:8px 20px;font-weight:700;font-size:0.88rem;transition:all 0.15s;}
.btn:active{transform:scale(0.95);}
.btn-gold{background:var(--gold);color:#000;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-grey{background:rgba(255,255,255,0.08);color:#ccc;}
.btn-red{background:rgba(231,76,60,0.25);color:#ff8888;border:1px solid rgba(231,76,60,0.35);}
/* 班級名單管理 */
.class-list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:rgba(255,255,255,0.05);margin-bottom:5px;font-size:0.85rem;cursor:pointer;border:1px solid transparent;transition:all 0.15s;}
.class-list-item:hover{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.25);}
.class-list-item.active-class{background:rgba(255,215,0,0.12);border-color:rgba(255,215,0,0.45);}
.class-list-name{flex:1;font-weight:600;color:var(--gold);}
.class-list-count{font-size:0.75rem;color:var(--muted);}
body.light-mode .class-list-item{background:rgba(0,0,0,0.04);}
body.light-mode .class-list-item:hover{background:rgba(212,160,23,0.08);}
body.light-mode .class-list-item.active-class{background:rgba(212,160,23,0.12);}

.cf-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.cf{position:absolute;top:-20px;animation:cfall linear forwards;}
@keyframes cfall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:#1e1e40;border:1px solid var(--border);border-radius:10px;padding:9px 20px;font-size:0.86rem;color:#fff;z-index:500;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ── 用戶狀態列 ─────────────────────── */
.nav-username{font-size:0.82rem;font-weight:700;color:var(--gold);padding:5px 12px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.25);border-radius:20px;white-space:nowrap;}
.nav-logout{font-size:0.78rem;font-weight:600;color:var(--muted);padding:5px 10px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:none;transition:all .2s;margin-left:4px;}
.nav-logout:hover{color:#fff;background:rgba(255,100,100,0.15);border-color:rgba(255,100,100,0.4);}
@media(max-width:540px){.nav-username{display:none;}.draw-name{font-size:2.8rem;}.t-big{font-size:4rem;}nav{padding:0 8px;}.nav-a{padding:5px 8px;font-size:0.75rem;}.logo{font-size:0.85rem;margin-right:5px;}}

/* ── 橫滑導航列 ─────────────────────── */
.nav-links{display:flex;align-items:center;gap:4px;flex:1;overflow:hidden;}
@media(max-width:600px){
  nav{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;padding:0 10px;gap:4px;}
  nav::-webkit-scrollbar{display:none;}
  .nav-links{overflow:visible;flex:none;}
  .logo{font-size:0.88rem;white-space:nowrap;flex-shrink:0;}
  .nav-a{flex-shrink:0;}
  .bg-switcher{gap:2px;margin-left:4px;flex-shrink:0;}
  .bg-picker-btn{width:22px;height:22px;}
  .theme-btn{flex-shrink:0;}
  .nav-username,.nav-logout{flex-shrink:0;}
  .draw-name{font-size:2.5rem;}
  .t-big{font-size:3.5rem;}
  .page-wrap{padding:68px 12px 32px;}
  .tab-nav{gap:6px;}
  .tab-btn{padding:8px 14px;font-size:0.82rem;}
  .btn-draw{padding:12px 32px;font-size:1rem;letter-spacing:2px;}
  .row-gap{gap:6px;}
  .row-gap .btn{padding:8px 14px;font-size:0.82rem;}
  .t-ctrl .t-btn{padding:9px 18px;font-size:0.9rem;}
  .t-presets{gap:5px;}
  .t-pre{padding:4px 10px;font-size:0.78rem;}
  .v-bar-wrap{min-width:0;}
}
</style>
</head>
<canvas id="bgCanvas"></canvas>
<body>
<nav>
  <a class="logo" href="app.html">文武雙全</a>
  <div class="nav-links">
    <a class="nav-a" href="app.html">🏠 主頁</a>
    <a class="nav-a" href="english.html">📚 英文</a>
    <a class="nav-a" href="sports.html">🏆 體育</a>
    <a class="nav-a active" href="tools.html">🎲 教具</a>
    <a class="nav-a" href="news.html">📰 體壇動態</a>
  </div>
  <div class="bg-switcher" id="bgSwitcher">
    <button class="bg-picker-btn active" data-bg="star"     data-label="✨ 星空流星" title="星空流星"></button>
    <button class="bg-picker-btn"        data-bg="geo"      data-label="⬡ 幾何網格" title="幾何網格"></button>
    <button class="bg-picker-btn"        data-bg="noise"    data-label="📄 噪點紙感" title="噪點紙感"></button>
    <button class="bg-picker-btn"        data-bg="mountain" data-label="🏔 視差山脈" title="視差山脈"></button>
    <button class="bg-picker-btn" id="bgCustomBtn" data-bg="custom" data-label="🖼 自定義圖片" title="自定義圖片" style="background:linear-gradient(135deg,#ff6b6b,#ffd700,#4ecdc4);font-size:13px;display:flex;align-items:center;justify-content:center;" onclick="bgCustomOpen()">🖼</button>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切換深淺色模式">🌙</button>
  <span class="nav-username" id="navUsername" style="display:none;"></span>
  <button class="nav-logout" id="navLogout" onclick="ssLogout()" style="display:none;">登出</button>
</nav>

<!-- 自定義圖片背景面板 -->
<div class="bg-custom-overlay" id="bgCustomOverlay" style="display:none;" onclick="if(event.target===this)bgCustomClose()">
  <div class="bg-custom-panel">
    <h3>🖼 自定義頁面背景</h3>
    <label class="bg-upload-zone" for="bgFileInput">
      <input type="file" id="bgFileInput" accept="image/*" onchange="bgHandleFile(this)">

/* ===== Supabase 設定 ===== */
const SB_URL='https://lqpuffsjirsnusjxtwin.supabase.co';
const SB_KEY='sb_publishable_QW-2DPyUIrzMwIkug8Tliw_cf1tx0qH';
async function sbFetch(path,options={}){
  const headers={
    'apikey':SB_KEY,
    'Authorization':'Bearer '+SB_KEY,
    'Content-Type':'application/json',
  };
  if(options.prefer) headers['Prefer']=options.prefer;
  Object.assign(headers,options.headers||{});
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    method:options.method||'GET',
    headers,
    body:options.body!==undefined?JSON.stringify(options.body):undefined,
  });
  if(!res.ok&&res.status!==204){const t=await res.text();throw new Error(t||String(res.status));}
  if(res.status===204)return null;
  const text=await res.text();
  if(!text||!text.trim())return null;
  try{return JSON.parse(text);}catch(e){throw new Error('Invalid JSON: '+text.slice(0,120));}
}

/* ===== 用戶系統 ===== */
function ssGetUser(){return localStorage.getItem('ssCurrentUser')||'';}
function ssGetId(){return localStorage.getItem('ssCurrentId')||'';}
function ssLogout(){

  localStorage.removeItem('ssCurrentId');

}
function ssInitNav(){

    const nu=document.getElementById('navUsername');

const SAMPLE=[
  "小明","小美","小華","小強","小玲",
  "大衛","安娜","阿偉","曉晴","俊傑",
  "淑芬","志豪","雅婷","美芳","建宏",
  "心怡","冠宇","詩涵","彥廷","佳穎"
];

/* TAB */
function switchTab(t,btn){
  ['draw','vote','timer'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('hidden',id!==t));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // hash 同步
  history.replaceState(null,'','#'+t);
}

/* ===== 班級名單管理 ===== */
// 資料遷移：若舊格式(ssClassLists Array)存在，轉換為新格式(ldClasses Object)
(function migrateClassData(){
  const old=localStorage.getItem('ssClassLists');
  if(old && !localStorage.getItem('ldClasses')){
    try{
      const arr=JSON.parse(old);
      const obj={};
      arr.forEach(c=>{ obj[c.name]=c.names; });
      localStorage.setItem('ldClasses',JSON.stringify(obj));
    }catch(e){}
  }
})();

let classes = JSON.parse(localStorage.getItem('ldClasses')||'{}');
let currentClass = localStorage.getItem('ldCurrentClass')||'';

async function ldLoadCloud(){
  const userId=ssGetId();
  const hint=document.getElementById('loginHint');
  if(!userId){
    hint.textContent='⚠️ 未登入，班別僅儲存在本機';
    return;
  }
  hint.textContent='☁️ 載入雲端班別中…';
  try{
    const rows=await sbFetch('lucky_classes?user_id=eq.'+userId+'&select=name,members&order=name');
    if(rows&&rows.length){
      classes={};
      rows.forEach(r=>{ classes[r.name]=r.members||[]; });
      localStorage.setItem('ldClasses',JSON.stringify(classes));
      renderClassTabs();
      let target=currentClass;
      if(!target||!classes[target]){ const k=Object.keys(classes); if(k.length) target=k[0]; }
      if(target&&classes[target]&&classes[target].length){
        currentClass=target;
        localStorage.setItem('ldCurrentClass',target);
        renderClassTabs();
        document.getElementById('nameInput').value=classes[target].join('\n');
        ldLoad();
      }
    }
    hint.textContent='👤 '+ssGetUser()+'　☁️ 雲端已同步';
  }catch(e){
    let msg=e.message||'';
    if(msg.includes('row-level security')) msg='請去 Supabase 關閉 lucky_classes 的 RLS';
    hint.textContent='⚠️ 雲端載入失敗：'+msg;
  }
}

async function ldSyncCloud(name, members){
  const userId=ssGetId();
  if(!userId){ showToast('⚠️ 未登入，只儲存在本機'); return; }
  try{
    await sbFetch('lucky_classes?user_id=eq.'+userId+'&name=eq.'+encodeURIComponent(name),{method:'DELETE'});
    await sbFetch('lucky_classes',{method:'POST',prefer:'return=minimal',body:{user_id:userId, name, members}});
  }catch(e){
    let msg=e.message||'';
    if(msg.includes('row-level security')) msg='請去 Supabase 關閉 lucky_classes 的 RLS';
    showToast('⚠️ 雲端同步失敗：'+msg);
    throw new Error(msg);
  }
}

async function ldDeleteCloud(name){
  const userId=ssGetId();
  if(!userId) return;
  try{
    await sbFetch('lucky_classes?user_id=eq.'+userId+'&name=eq.'+encodeURIComponent(name),{method:'DELETE'});
  }catch(e){}
}

function renderClassTabs(){
  const el=document.getElementById('classTabs');
  const keys=Object.keys(classes);
  if(!keys.length){
    el.innerHTML='<span style="color:var(--muted);font-size:0.82rem;">尚無班別，請新增</span>';
    return;
  }
  el.innerHTML=keys.map(k=>`
    <span style="display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:0.85rem;cursor:pointer;border:1px solid;transition:all 0.2s;
      ${k===currentClass
        ? 'background:rgba(58,134,255,0.22);border-color:rgba(58,134,255,0.6);color:#7ec8ff;'
        : 'background:rgba(255,255,255,0.07);border-color:var(--border);color:#ccc;'}"
      onclick="classSwitch('${k.replace(/'/g,"\\'")}')">
      ${k}
      <button onclick="event.stopPropagation();classDelete('${k.replace(/'/g,"\\'")}');"
        style="background:none;border:none;color:#ff8888;cursor:pointer;font-size:0.9rem;padding:0;line-height:1;">×</button>
    </span>`).join('');
}

function classSwitch(name){
  currentClass=name;
  localStorage.setItem('ldCurrentClass',name);
  renderClassTabs();
  const members=classes[name]||[];
  document.getElementById('nameInput').value=members.join('\n');
  if(members.length) ldLoad();
  showToast('📂 已切換到：'+name);
}

async function classSave(){
  if(!currentClass){ showToast('⚠️ 請先選擇或新增班別'); return; }
  const raw=document.getElementById('nameInput').value.trim();
  if(!raw){ showToast('⚠️ 請先輸入學生名單'); return; }
  const names=raw.split(/[\n,，]+/).map(n=>n.trim()).filter(n=>n);
  if(!names.length){ showToast('名單無效'); return; }
  classes[currentClass]=names;
  localStorage.setItem('ldClasses',JSON.stringify(classes));
  renderClassTabs();
  try{
    await ldSyncCloud(currentClass, names);
    showToast('✅ 已儲存「'+currentClass+'」（'+names.length+' 人）☁️');
  }catch(e){
    showToast('✅ 已儲存本機「'+currentClass+'」，雲端失敗');
  }
}

async function classAdd(){
  const inp=document.getElementById('classNameInput');
  const name=inp.value.trim();
  if(!name){ showToast('請輸入班別名稱'); return; }
  if(classes[name]!==undefined){ showToast('⚠️ 此班別已存在'); return; }
  classes[name]=[];
  localStorage.setItem('ldClasses',JSON.stringify(classes));
  currentClass=name;
  localStorage.setItem('ldCurrentClass',name);
  inp.value='';
  renderClassTabs();
  showToast('✅ 已新增班別：'+name+'，請輸入名單後按「儲存目前名單」');
}

async function classDelete(name){
  if(!confirm('確定刪除班別「'+name+'」？')) return;
  delete classes[name];
  localStorage.setItem('ldClasses',JSON.stringify(classes));
  if(currentClass===name){ currentClass=''; localStorage.removeItem('ldCurrentClass'); }
  await ldDeleteCloud(name);
  renderClassTabs();
  showToast('🗑 已刪除：'+name);
}

/* ===== LUCKY DRAW ===== */
let ldAll=[],ldRemain=[],ldDrawn=[],ldBusy=false;

function ldLoad(){
  const raw=document.getElementById('nameInput').value;
  const names=raw.split(/[\n,，]+/).map(n=>n.trim()).filter(n=>n.length>0);
  if(!names.length){showToast('請先輸入名字');return;}
  ldAll=[...names];ldRemain=[...names];ldDrawn=[];
  ldRender();ldRenderDrawn();
  document.getElementById('ldName').textContent='？';
  document.getElementById('ldName').className='draw-name';
  document.getElementById('ldBtn').disabled=false;
  showToast('已載入 '+names.length+' 位同學 ✅');
}
function ldSample(){document.getElementById('nameInput').value=SAMPLE.join('\n');ldLoad();}
function ldReset(){
  if(!ldAll.length)return;
  ldRemain=[...ldAll];ldDrawn=[];ldRender();ldRenderDrawn();
  document.getElementById('ldName').textContent='？';
  document.getElementById('ldName').className='draw-name';
  document.getElementById('ldBtn').disabled=false;
  showToast('已重置抽籤');
}
function ldUndo(){
  if(!ldDrawn.length)return;
  const last=ldDrawn.pop();
  ldRemain.push(last);
  ldRender();ldRenderDrawn();
  document.getElementById('ldBtn').disabled=false;
  showToast('已取消：'+last);
}
function ldRender(){
  document.getElementById('ldCount').textContent='共 '+ldAll.length+' 人，剩餘 '+ldRemain.length+' 人未抽';
  document.getElementById('ldTags').innerHTML=ldAll.map(n=>`<span class="ntag${ldDrawn.includes(n)?' drawn':''}">${n}</span>`).join('');
}
function ldRenderDrawn(){
  const w=document.getElementById('ldDrawn');
  if(!ldDrawn.length){w.innerHTML='<span style="color:var(--muted);font-size:0.88rem;">尚未抽出任何人</span>';return;}
  w.innerHTML=ldDrawn.map((n,i)=>`<span class="dtag">${i+1}. ${n}</span>`).join('');
}
function ldDraw(){
  if(ldBusy)return;
  if(!ldRemain.length){showToast('所有人已抽完，請重置 🎉');return;}
  ldBusy=true;
  document.getElementById('ldBtn').disabled=true;
  const el=document.getElementById('ldName');
  el.className='draw-name rolling';
  let count=0,total=24+Math.floor(Math.random()*10),delay=55;
  function roll(){
    el.textContent=ldRemain[Math.floor(Math.random()*ldRemain.length)];
    count++;
    if(count>=total*0.65)delay=130;
    if(count>=total*0.82)delay=240;
    if(count<total){setTimeout(roll,delay);return;}
    // finalize
    const wi=Math.floor(Math.random()*ldRemain.length);
    const winner=ldRemain.splice(wi,1)[0];
    ldDrawn.push(winner);
    el.textContent=winner;
    el.className='draw-name result';
    ldBusy=false;
    document.getElementById('ldBtn').disabled=(ldRemain.length===0);
    ldRender();ldRenderDrawn();
    launchConfetti();
  }
  roll();
}

/* ===== VOTE ===== */
let voteData=[];
function startVote(){
  const q=document.getElementById('voteQ').value.trim();
  const opts=[...document.querySelectorAll('.vote-opt-input')].map(i=>i.value.trim()).filter(v=>v);
  if(opts.length<2){showToast('請至少填寫兩個選項');return;}
  voteData=opts.map(o=>({label:o,count:0}));
  document.getElementById('voteSetup').classList.add('hidden');
  document.getElementById('voteLive').classList.remove('hidden');
  document.getElementById('voteTitle').textContent=q||'請投票';
  renderVoteBtns();renderVoteBars();
}
function renderVoteBtns(){
  const colors=['#3a86ff','#4ecdc4','#ffd700','#ff6b6b'];
  document.getElementById('voteBtns').innerHTML=voteData.map((o,i)=>`
    <button class="vote-btn" onclick="addVote(${i})" style="background:${colors[i]};color:${i===2?'#000':'#fff'}">${o.label}</button>`).join('');
}
function addVote(i){
  voteData[i].count++;
  const total=voteData.reduce((s,o)=>s+o.count,0);
  document.getElementById('voteTotal').textContent=total;
  renderVoteBars();
}
function renderVoteBars(){
  const total=voteData.reduce((s,o)=>s+o.count,0)||1;
  document.getElementById('voteBars').innerHTML=voteData.map(o=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <span style="min-width:80px;font-size:0.88rem;color:#ccc;">${o.label}</span>
      <div class="v-bar-wrap"><div class="v-bar" style="width:${Math.round(o.count/total*100)}%"></div></div>
      <span class="v-count">${o.count}</span>
      <span style="font-size:0.78rem;color:var(--muted);min-width:36px;">${Math.round(o.count/total*100)}%</span>
    </div>`).join('');
}
function resetVote(){
  voteData=[];
  document.getElementById('voteLive').classList.add('hidden');
  document.getElementById('voteSetup').classList.remove('hidden');
  document.getElementById('voteQ').value='';
  document.querySelectorAll('.vote-opt-input').forEach(i=>i.value='');
}

let ttSec=300,ttRun=false,ttIv=null;
function ttFmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function ttUpd(){const el=document.getElementById('ttDisp');el.textContent=ttFmt(ttSec);el.classList.toggle('warn',ttSec<=10&&ttSec>0);}
function ttSet(s){ttStop();ttSec=s;ttUpd();}
function ttCustom(){ttSet((parseInt(document.getElementById('ttMin').value)||0)*60+(parseInt(document.getElementById('ttSec').value)||0));}
function ttStart(){if(ttRun||ttSec<=0)return;ttRun=true;ttIv=setInterval(()=>{if(ttSec<=0){ttPause();ttBeep();showToast('⏰ 時間到！');return;}ttSec--;ttUpd();},1000);}
function ttPause(){ttRun=false;clearInterval(ttIv);}
function ttStop(){ttPause();ttSec=300;ttUpd();}
function ttBeep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type='sine';osc.frequency.value=880;g.gain.setValueAtTime(0.6,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);osc.start();osc.stop(ctx.currentTime+0.8);}catch(e){}}

/* ===== CONFETTI ===== */
const CF_COLORS=['#ffd700','#ff6b6b','#4ecdc4','#3a86ff','#96ceb4','#ff9ff3','#ffeaa7'];
function launchConfetti(){
  const wrap=document.getElementById('cfWrap');wrap.innerHTML='';
  for(let i=0;i<80;i++){
    const d=document.createElement('div');d.className='cf';
    d.style.cssText=`left:${Math.random()*100}vw;background:${CF_COLORS[i%CF_COLORS.length]};width:${8+Math.random()*8}px;height:${10+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;opacity:${0.5+Math.random()*0.5};`;
    wrap.appendChild(d);
  }
  setTimeout(()=>wrap.innerHTML='',4000);
}

(function autoRestoreClass(){
  const saved = JSON.parse(localStorage.getItem('ldClasses')||'{}');
  const lastClass = localStorage.getItem('ldCurrentClass')||'';
  const keys = Object.keys(saved);
  if(!keys.length) return;
  const target = (lastClass && saved[lastClass]) ? lastClass : keys[0];
  const members = saved[target] || [];
  if(!members.length) return;
  classes = saved;
  currentClass = target;
  localStorage.setItem('ldCurrentClass', target);
  renderClassTabs();
  document.getElementById('nameInput').value = members.join('\n');
  ldLoad();
})();

// ===== 背景主題切換器 =====
const BG_BODY_CLASSES={star:[],geo:['bg-geo'],noise:['bg-noise'],mountain:['bg-mountain']};
let currentBg=localStorage.getItem('ssBg')||'star';
let bgRaf=null;
function applyBgTheme(name){
  document.body.classList.remove('bg-geo','bg-noise','bg-mountain');
  (BG_BODY_CLASSES[name]||[]).forEach(c=>document.body.classList.add(c));
  document.querySelectorAll('.bg-picker-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.bg===name));
  currentBg=name; localStorage.setItem('ssBg',name);
  if(bgRaf) cancelAnimationFrame(bgRaf);
  startBgCanvas(name);
}
document.getElementById('bgSwitcher').addEventListener('click',e=>{
  const btn=e.target.closest('.bg-picker-btn');
  if(btn && btn.dataset.bg!=='custom') applyBgTheme(btn.dataset.bg);
});
(function(){
  const cv=document.getElementById('bgCanvas');
  const ctx=cv.getContext('2d');
  let W,H;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  window.addEventListener('resize',()=>{resize();if(currentBg)startBgCanvas(currentBg);});
  resize();
  function bgStar(){
    let stars=[],comets=[],lastComet=0;
    const n=Math.floor(W*H/4800);
    for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.2,a:Math.random(),da:(Math.random()-0.5)*0.009,color:['#ffffff','#ffd700','#3a86ff','#4ecdc4'][Math.floor(Math.random()*4)]});
    function spawnComet(){const y=Math.random()*H*0.65,len=90+Math.random()*130,spd=4+Math.random()*3.5;comets.push({x:-60,y,vx:spd,vy:spd*0.38,len});}
    return function draw(){
      ctx.clearRect(0,0,W,H);
      stars.forEach(s=>{s.a+=s.da;if(s.a<=0||s.a>=1)s.da=-s.da;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.color;ctx.globalAlpha=s.a*0.78;ctx.fill();});
      const now=performance.now();if(now-lastComet>1800+Math.random()*3500){spawnComet();lastComet=now;}
      ctx.globalAlpha=1;
      comets.forEach(c=>{const g=ctx.createLinearGradient(c.x,c.y,c.x-c.len,c.y-c.len*0.38);g.addColorStop(0,'rgba(255,255,255,0.92)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.strokeStyle=g;ctx.lineWidth=2.4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.lineTo(c.x-c.len,c.y-c.len*0.38);ctx.stroke();c.x+=c.vx;c.y+=c.vy;});
      comets=comets.filter(c=>c.x<W+200&&c.y<H+200);
      bgRaf=requestAnimationFrame(draw);
    };
  }
  function bgGeo(){
    const CELL=52,DOT=1.3;let nodes=[];
    const cols=Math.ceil(W/CELL)+2,rows=Math.ceil(H/CELL)+2;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) nodes.push({bx:(c-0.5)*CELL,by:(r-0.5)*CELL,ox:0,oy:0,a:Math.random()*Math.PI*2,da:(Math.random()-0.5)*0.008,amp:4+Math.random()*6});
    return function draw(){
      ctx.clearRect(0,0,W,H);
      nodes.forEach(n=>{n.a+=n.da;n.ox=Math.cos(n.a)*n.amp;n.oy=Math.sin(n.a)*n.amp;});
      for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){const i=r*cols+c,n=nodes[i],nx=n.bx+n.ox,ny=n.by+n.oy;
        if(c+1<cols){const m=nodes[i+1];ctx.beginPath();ctx.moveTo(nx,ny);ctx.lineTo(m.bx+m.ox,m.by+m.oy);ctx.strokeStyle='rgba(255,215,0,0.07)';ctx.lineWidth=0.9;ctx.stroke();}
        if(r+1<rows){const m=nodes[i+cols];ctx.beginPath();ctx.moveTo(nx,ny);ctx.lineTo(m.bx+m.ox,m.by+m.oy);ctx.strokeStyle='rgba(58,134,255,0.07)';ctx.lineWidth=0.9;ctx.stroke();}
        if(c+1<cols&&r+1<rows){const m=nodes[i+cols+1];ctx.beginPath();ctx.moveTo(nx,ny);ctx.lineTo(m.bx+m.ox,m.by+m.oy);ctx.strokeStyle='rgba(78,205,196,0.035)';ctx.lineWidth=0.7;ctx.stroke();}
        ctx.beginPath();ctx.arc(nx,ny,DOT,0,Math.PI*2);ctx.fillStyle='rgba(255,215,0,0.22)';ctx.globalAlpha=1;ctx.fill();
      }}
      const cx=W/2,cy=H/2;
      for(let i=0;i<8;i++){const angle=i*Math.PI/4+(performance.now()*0.0001);const g=ctx.createLinearGradient(cx,cy,cx+Math.cos(angle)*W*0.7,cy+Math.sin(angle)*H*0.7);g.addColorStop(0,'rgba(255,215,0,0.05)');g.addColorStop(1,'rgba(255,215,0,0)');ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle)*W,cy+Math.sin(angle)*H);ctx.strokeStyle=g;ctx.lineWidth=60;ctx.stroke();}
      bgRaf=requestAnimationFrame(draw);
    };
  }
  function bgNoise(){
    const offC=document.createElement('canvas');offC.width=offC.height=256;
    const offCtx=offC.getContext('2d'),imgData=offCtx.createImageData(256,256);
    for(let i=0;i<imgData.data.length;i+=4){const v=Math.random()*255|0;imgData.data[i]=v;imgData.data[i+1]=v;imgData.data[i+2]=v;imgData.data[i+3]=18;}
    offCtx.putImageData(imgData,0,0);
    const noisePat=ctx.createPattern(offC,'repeat');
    let blobs=[];
    for(let i=0;i<5;i++) blobs.push({x:Math.random()*W,y:Math.random()*H,r:180+Math.random()*200,a:Math.random()*Math.PI*2,spd:0.004+Math.random()*0.006,col:['rgba(255,215,0,','rgba(58,134,255,','rgba(78,205,196,'][i%3],opa:0.04+Math.random()*0.04});
    return function draw(){
      ctx.clearRect(0,0,W,H);ctx.globalAlpha=0.9;ctx.fillStyle=noisePat;ctx.fillRect(0,0,W,H);
      blobs.forEach(b=>{b.a+=b.spd;const bx=b.x+Math.cos(b.a)*60,by=b.y+Math.sin(b.a)*40;const g=ctx.createRadialGradient(bx,by,0,bx,by,b.r);g.addColorStop(0,b.col+b.opa+')');g.addColorStop(1,b.col+'0)');ctx.globalAlpha=1;ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,b.r,0,Math.PI*2);ctx.fill();});
      for(let y=0;y<H;y+=3){ctx.globalAlpha=0.012;ctx.fillStyle=y%6===0?'rgba(255,255,255,1)':'rgba(0,0,0,1)';ctx.fillRect(0,y,W,1);}
      ctx.globalAlpha=1;bgRaf=requestAnimationFrame(draw);
    };
  }
  function bgMountain(){
    function makeMountain(n,minH,maxH,seed){const pts=[{x:0,y:H}];for(let i=0;i<=n;i++){const x=i*W/n,y=H-(minH+(Math.sin(i*seed+seed)*0.5+0.5)*(maxH-minH));pts.push({x,y});}pts.push({x:W,y:H});return pts;}
    const layers=[{pts:makeMountain(12,H*0.52,H*0.72,1.7),col:'rgba(10,30,60,0.85)',speed:0},{pts:makeMountain(10,H*0.42,H*0.62,2.3),col:'rgba(15,40,80,0.80)',speed:0.08},{pts:makeMountain(8,H*0.32,H*0.52,3.1),col:'rgba(20,55,110,0.70)',speed:0.18},{pts:makeMountain(6,H*0.22,H*0.42,4.2),col:'rgba(30,70,140,0.55)',speed:0.30},{pts:makeMountain(5,H*0.14,H*0.30,5.8),col:'rgba(50,100,180,0.35)',speed:0.44}];
    let prevTS=0;let stars2=[];const ns=Math.floor(W*H/9000);
    for(let i=0;i<ns;i++) stars2.push({x:Math.random()*W,y:Math.random()*H*0.55,r:Math.random()+0.3,a:Math.random(),da:(Math.random()-0.5)*0.006});
    return function draw(ts){
      prevTS=ts;ctx.clearRect(0,0,W,H);
      stars2.forEach(s=>{s.a+=s.da;if(s.a<=0||s.a>=1)s.da=-s.da;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.globalAlpha=s.a*0.6;ctx.fill();});
      ctx.globalAlpha=1;
      const gh=ctx.createLinearGradient(0,H*0.55,0,H);gh.addColorStop(0,'rgba(5,15,40,0)');gh.addColorStop(1,'rgba(5,15,40,0.95)');ctx.fillStyle=gh;ctx.fillRect(0,H*0.55,W,H*0.45);
      [...layers].reverse().forEach(layer=>{ctx.beginPath();ctx.moveTo(layer.pts[0].x,layer.pts[0].y);layer.pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.fillStyle=layer.col;ctx.fill();});
      const mg=ctx.createRadialGradient(W*0.78,H*0.12,0,W*0.78,H*0.12,W*0.28);mg.addColorStop(0,'rgba(180,210,255,0.10)');mg.addColorStop(1,'rgba(180,210,255,0)');ctx.fillStyle=mg;ctx.fillRect(0,0,W,H);
      bgRaf=requestAnimationFrame(draw);
    };
  }
  window.startBgCanvas=function(name){
    if(bgRaf) cancelAnimationFrame(bgRaf);
    resize();
    let drawFn;
    if(name==='star') drawFn=bgStar();
    else if(name==='geo') drawFn=bgGeo();
    else if(name==='noise') drawFn=bgNoise();
    else if(name==='mountain') drawFn=bgMountain();
    if(drawFn) bgRaf=requestAnimationFrame(drawFn);
  };
  startBgCanvas(currentBg);
})();
applyBgTheme(currentBg);

// ===== 自定義圖片背景 =====
function getBgCustomKey(){ const uid=localStorage.getItem('ssCurrentId')||'guest'; return 'ssBgCustomImg_tools_'+uid; }

// 判斷是否為 base64（本地圖片）
function bgIsBase64(s){ return s&&s.startsWith('data:'); }

// 套用背景（只渲染，不存）
function _applyBgVisual(dataUrl){
  document.body.style.backgroundImage='url('+dataUrl+')';
  document.body.classList.add('bg-custom-img');
  document.querySelectorAll('.bg-picker-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bgCustomBtn').classList.add('active');
  document.getElementById('bgCustomPreviewImg').src=dataUrl;
  document.getElementById('bgCustomPreview').style.display='block';
}

// 套用並儲存（本地 + 雲端）
async function applyCustomBg(dataUrl){
  _applyBgVisual(dataUrl);
  // 本地備份（base64 本地存，URL 也本地存一份方便離線）
  localStorage.setItem(getBgCustomKey(), dataUrl);
  // 雲端同步：只有 URL（非 base64）且已登入才同步
  if(!bgIsBase64(dataUrl)){
    const uid=ssGetId();
    if(uid){
      try{
        const r=await sbFetch('users?id=eq.'+uid,{method:'PATCH',prefer:'return=minimal',body:{bg_url:dataUrl}});
        console.log('[bgSync] PATCH result=',r,'url=',dataUrl.slice(0,60));
      }catch(e){ console.warn('[bgSync] upload error:',e); }
    } else { console.log('[bgSync] not logged in, skip cloud sync'); }
  } else { console.log('[bgSync] base64 image, local only'); }
}

// 初始化：已登入優先讀雲端，否則讀本地
(async function initCustomBg(){
  const uid=ssGetId();
  console.log('[bgSync] initCustomBg uid=',uid);
  if(uid){
    try{
      const rows=await sbFetch('users?id=eq.'+uid+'&select=bg_url');
      console.log('[bgSync] cloud rows=',rows);
      if(rows&&rows[0]&&rows[0].bg_url){
        localStorage.setItem(getBgCustomKey(), rows[0].bg_url);
        _applyBgVisual(rows[0].bg_url);
        console.log('[bgSync] applied from cloud:',rows[0].bg_url.slice(0,60));
        return;
      }
    }catch(e){ console.warn('[bgSync] init error:',e); }
  }
  const saved=localStorage.getItem(getBgCustomKey());
  console.log('[bgSync] local saved=',saved?saved.slice(0,60):'none');
  if(saved) _applyBgVisual(saved);
})();

function bgCustomOpen(){ document.getElementById('bgCustomOverlay').style.display='flex'; }
function bgCustomClose(){ document.getElementById('bgCustomOverlay').style.display='none'; }
function bgHandleFile(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>applyCustomBg(e.target.result);
  reader.readAsDataURL(file);
  bgCustomClose();
}
function bgApplyUrl(){
  const url=document.getElementById('bgUrlInput').value.trim();
  if(!url)return;
  applyCustomBg(url);
  bgCustomClose();
}
async function bgCustomClear(){
  localStorage.removeItem(getBgCustomKey());
  document.body.style.backgroundImage='';
  document.body.classList.remove('bg-custom-img');
  document.getElementById('bgCustomBtn').classList.remove('active');
  document.getElementById('bgCustomPreview').style.display='none';
  applyBgTheme(currentBg);
  bgCustomClose();
  // 雲端清除
  const uid=ssGetId();
  if(uid){
    try{
      await sbFetch('users?id=eq.'+uid,{method:'PATCH',prefer:'return=minimal',body:{bg_url:null}});
    }catch(e){ console.warn('bgSync clear:',e); }
  }
}




// ===== 深淺色模式 =====
function applyTheme(mode){
  document.body.classList.toggle('light-mode', mode==='light');
  document.getElementById('themeBtn').textContent = mode==='light' ? '🌙' : '☀️';
}
function toggleTheme(){
  const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';
  localStorage.setItem('ssTheme', next);
  applyTheme(next);
}
(function(){ applyTheme(localStorage.getItem('ssTheme')||'dark'); })();
