<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>體壇動態 | 文武雙全</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#ffd700;--teal:#4ecdc4;--red:#ff6b6b;--green:#2ecc71;--blue:#3a86ff;
  --bg:#080814;--bg2:#0f0f22;--card:#13132b;--card2:#1a1a38;
  --border:rgba(255,255,255,0.08);--border2:rgba(78,205,196,0.2);
  --muted:#666;--radius:18px;--text:#f0f0ff;--text2:#aaa;
  --nav-bg:rgba(8,8,20,0.96);
  --grad1:linear-gradient(135deg,#0f0f22,#1a1040);
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
a{text-decoration:none;}

/* LIGHT MODE */
body.light-mode{
  --bg:#edf3f8;--bg2:#e4eef5;--card:#fff;--card2:#ebf2f8;
  --border:rgba(0,0,0,0.08);--border2:rgba(78,205,196,0.3);
  --muted:#666;--text:#111130;--text2:#444;--nav-bg:rgba(237,243,248,0.96);--gold:#d4a017;
  --grad1:linear-gradient(135deg,#edf3f8,#e2ecf5);
  background:radial-gradient(ellipse 70% 55% at 8% 15%, rgba(78,205,196,0.16) 0%, transparent 65%),radial-gradient(ellipse 60% 50% at 92% 82%, rgba(58,134,255,0.14) 0%, transparent 65%),radial-gradient(ellipse 50% 45% at 50% 45%, rgba(255,215,0,0.08) 0%, transparent 60%),#edf3f8;
}
body.light-mode .nav-a{color:#555;}
body.light-mode .nav-a:hover{color:#111;background:rgba(0,0,0,0.05);}
body.light-mode .news-title{color:#111130;}
body.light-mode .skel-img,.light-mode .skel-line{background:linear-gradient(90deg,rgba(0,0,0,0.05) 25%,rgba(0,0,0,0.1) 50%,rgba(0,0,0,0.05) 75%);background-size:200% 100%;}

/* ── 背景 Canvas 層 ─────────────────────── */
#bgCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity 0.6s;}
.page-wrap{position:relative;z-index:1;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity 0.6s;
  background:
    radial-gradient(ellipse 60% 50% at 10% 15%, rgba(78,205,196,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 80%, rgba(58,134,255,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 50% 45%, rgba(255,215,0,0.05) 0%, transparent 60%);}
body::after{content:'';position:fixed;inset:-10% -10% -5% -10%;z-index:0;pointer-events:none;
  background:
    conic-gradient(from 110deg at 12% 18%, rgba(78,205,196,0.12), transparent 40%),
    conic-gradient(from -30deg at 88% 78%, rgba(58,134,255,0.12), transparent 40%),
    radial-gradient(60% 40% at 50% 90%, rgba(255,215,0,0.04), transparent 60%);
  filter:blur(42px) saturate(120%);
  animation:auroraShift 18s ease-in-out infinite alternate;
  transition:opacity 0.6s;}
@keyframes auroraShift{0%{transform:translate3d(0,0,0) rotate(0deg);}50%{transform:translate3d(1.5%,-1.5%,0) rotate(2deg);}100%{transform:translate3d(-1%,1%,0) rotate(-2deg);}}
.bg-noise body::before{background:radial-gradient(ellipse 70% 60% at 15% 20%, rgba(78,205,196,0.06) 0%, transparent 65%),radial-gradient(ellipse 55% 50% at 85% 75%, rgba(58,134,255,0.06) 0%, transparent 62%);}
.bg-noise body::after{opacity:0.5;}
.bg-noise #bgCanvas{opacity:0.9;}
.bg-mountain body::before{background:radial-gradient(ellipse 100% 60% at 50% 100%, rgba(0,30,60,0.95) 0%, transparent 70%),radial-gradient(ellipse 80% 50% at 50% 50%, rgba(10,20,40,0.5) 0%, transparent 100%);}
.bg-mountain body::after{background:radial-gradient(ellipse 80% 40% at 50% 95%, rgba(58,134,255,0.18) 0%, transparent 60%),conic-gradient(from 160deg at 50% 80%, rgba(78,205,196,0.12), transparent 30%);filter:blur(30px);animation:mountainGlow 8s ease-in-out infinite alternate;}
@keyframes mountainGlow{0%{opacity:0.7;}100%{opacity:1;}}
.bg-geo body::before{background:radial-gradient(ellipse 60% 50% at 12% 15%, rgba(78,205,196,0.10) 0%, transparent 70%),radial-gradient(ellipse 50% 40% at 88% 78%, rgba(58,134,255,0.09) 0%, transparent 65%),radial-gradient(ellipse 40% 35% at 50% 50%, rgba(255,215,0,0.04) 0%, transparent 60%);}
.bg-geo body::after{opacity:0.6;filter:blur(38px);}
body.light-mode #bgCanvas{opacity:0.55;filter:invert(1) hue-rotate(180deg) saturate(0.6) brightness(1.1);}
body.light-mode::before{
  opacity:1;
  background:
    radial-gradient(ellipse 65% 55% at 8% 15%, rgba(78,205,196,0.22) 0%, transparent 68%),
    radial-gradient(ellipse 55% 45% at 90% 80%, rgba(58,134,255,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 50% 45%, rgba(255,215,0,0.10) 0%, transparent 60%);
}
body.light-mode::after{opacity:0.55;filter:blur(40px) saturate(160%) brightness(1.3);}
body.light-mode.bg-noise #bgCanvas{opacity:0.35;filter:none;}
body.light-mode.bg-mountain #bgCanvas{opacity:0.45;filter:none;}
body.light-mode.bg-mountain::before{
  background:
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(58,134,255,0.22) 0%, transparent 70%),
    radial-gradient(ellipse 80% 50% at 50% 50%, rgba(78,205,196,0.14) 0%, transparent 100%);
}
/* ── 背景切換器按鈕 ─────────────────────── */
.bg-switcher{display:flex;align-items:center;gap:4px;}
.bg-picker-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;flex-shrink:0;}
.bg-picker-btn:hover{transform:scale(1.18);box-shadow:0 0 8px rgba(255,255,255,0.3);}
.bg-picker-btn.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.5);}
.bg-picker-btn[data-bg="star"]{background:radial-gradient(circle at 40% 35%, #3a86ff 0%, #0d0d1a 70%);}
.bg-picker-btn[data-bg="geo"]{background:linear-gradient(135deg, #1e1e40 0%, #3a86ff 50%, #4ecdc4 100%);}
.bg-picker-btn[data-bg="noise"]{background:radial-gradient(circle, #c8a24a 0%, #3d2c08 60%, #1a1000 100%);}
.bg-picker-btn[data-bg="mountain"]{background:linear-gradient(to bottom, #0d0d1a 0%, #1a3050 55%, #3a86ff 100%);}
.bg-picker-btn::after{content:attr(data-label);position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;font-size:0.7rem;padding:3px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;}
.bg-picker-btn:hover::after{opacity:1;}
/* 自定義圖片背景 */
.bg-custom-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.bg-custom-panel{background:var(--card,#1e1e40);border:1px solid var(--border,rgba(255,255,255,0.12));border-radius:20px;padding:28px 28px 24px;width:min(480px,92vw);box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.bg-custom-panel h3{font-size:1rem;font-weight:800;color:var(--gold,#ffd700);margin-bottom:16px;}
.bg-upload-zone{border:2px dashed var(--border,rgba(255,255,255,0.18));border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px;display:block;}
.bg-upload-zone:hover{border-color:rgba(58,134,255,0.6);background:rgba(58,134,255,0.05);}
.bg-upload-zone input{display:none;}
.bg-url-inp{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border,rgba(255,255,255,0.12));border-radius:10px;color:var(--text,#fff);font-size:0.88rem;padding:9px 13px;margin-bottom:10px;box-sizing:border-box;}
.bg-url-inp:focus{border-color:var(--blue,#3a86ff);outline:none;}
body.light-mode .bg-custom-panel{background:#fff;}
body.light-mode .bg-url-inp{color:#1a1a2e;background:rgba(0,0,0,0.05);}
body.bg-custom-img{background-size:cover;background-position:center;background-attachment:scroll;}
body.bg-custom-img::before{opacity:0.3!important;}
body.bg-custom-img::after{opacity:0.25!important;}
body.bg-custom-img #bgCanvas{opacity:0.15!important;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:0 24px;height:52px;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.logo{font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:2px;margin-right:14px;white-space:nowrap;}
.nav-a{padding:7px 13px;border-radius:20px;font-size:0.83rem;font-weight:600;color:var(--muted);transition:all .2s;white-space:nowrap;}
.nav-a:hover{color:var(--text);background:rgba(255,255,255,0.07);}
.nav-a.active{background:var(--teal);color:#000;}
.theme-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:1rem;color:var(--gold);transition:all .2s;margin-left:0;}
.theme-btn:hover{background:rgba(255,215,0,0.1);}

/* PAGE */
.page-wrap{padding:72px 20px 60px;max-width:1040px;margin:0 auto;}

/* HERO BANNER */
.hero{position:relative;border-radius:24px;overflow:hidden;margin-bottom:28px;min-height:200px;background:linear-gradient(135deg,#0d0d2b 0%,#1a0a3a 50%,#0a1a3a 100%);}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=1200&q=80&auto=format&fit=crop') center/cover no-repeat;opacity:.22;filter:blur(1px);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(120deg,rgba(8,8,20,.85) 40%,rgba(78,205,196,.08) 100%);}
.hero-content{position:relative;padding:36px 32px 32px;}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(78,205,196,.15);border:1px solid rgba(78,205,196,.3);border-radius:20px;padding:4px 14px;font-size:0.75rem;font-weight:700;color:var(--teal);letter-spacing:1px;margin-bottom:14px;}
.hero-tag .ldot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink 1.6s infinite;}
.hero-title{font-size:2rem;font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.hero-title span{color:var(--teal);}
.hero-sub{color:rgba(255,255,255,.55);font-size:.9rem;}
.hero-stats{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;}
.hero-stat{text-align:center;}
.hero-stat-n{font-size:1.4rem;font-weight:900;color:var(--gold);}
.hero-stat-l{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:1px;}

/* TOPBAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;}
.right-bar{display:flex;align-items:center;gap:10px;}
.count-badge{font-size:.72rem;background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.2);border-radius:12px;padding:3px 12px;font-weight:700;}
.refresh-btn{background:rgba(78,205,196,.1);border:1px solid rgba(78,205,196,.25);border-radius:20px;padding:8px 18px;color:var(--teal);font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s;}
.refresh-btn:hover{background:rgba(78,205,196,.22);border-color:var(--teal);transform:translateY(-1px);}
.refresh-btn .ri{display:inline-block;transition:transform .3s;}
.refresh-btn:hover .ri{transform:rotate(180deg);}
@keyframes spin{to{transform:rotate(360deg)}}

/* STATUS */
.status-bar{display:flex;align-items:center;justify-content:center;gap:7px;padding:8px;font-size:.78rem;color:var(--muted);margin-bottom:18px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0;animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* SOURCE COLOUR MAP */
.src-bbc    {background:rgba(255, 60,60,.15);color:#ff8888;}
.src-espn   {background:rgba(255,100,20,.15);color:#ffaa55;}
.src-sky    {background:rgba(30,120,255,.15);color:#6699ff;}
.src-talk   {background:rgba(200,60,255,.15);color:#dd88ff;}
.src-euro   {background:rgba(255,210,0,.12);color:#ffdd44;}
.src-sn     {background:rgba(78,205,196,.15);color:var(--teal);}
.src-other  {background:rgba(255,255,255,.08);color:#ccc;}

/* NEWS GRID — masonry-like 3 col */
.news-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
@media(max-width:800px){.news-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:520px){.news-grid{grid-template-columns:1fr;}}

/* CARD */
.news-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;flex-direction:column;
  color:var(--text);
  opacity:0;transform:translateY(20px);
  animation:fadeUp .45s ease forwards;
  transition:transform .3s cubic-bezier(.25,.8,.25,1),border-color .25s,box-shadow .3s;
  position:relative;
}
.news-card:hover{
  transform:translateY(-8px) scale(1.015);
  border-color:var(--border2);
  box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px rgba(78,205,196,.15);
}
/* First card spans 2 cols */
.news-card.hero-card{grid-column:span 2;}
@media(max-width:800px){.news-card.hero-card{grid-column:span 2;}}
@media(max-width:520px){.news-card.hero-card{grid-column:span 1;}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* IMAGE */
.news-thumb{width:100%;height:175px;object-fit:cover;display:block;background:var(--bg2);transition:transform .4s ease;}
.news-card:hover .news-thumb{transform:scale(1.04);}
.news-card.hero-card .news-thumb{height:248px;}
.news-thumb-ph{
  width:100%;height:130px;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
  background:linear-gradient(135deg,var(--bg2),rgba(78,205,196,.05));
  color:rgba(255,255,255,.15);
}
/* Gradient overlay on image */
.news-img-wrap{position:relative;overflow:hidden;}
.news-img-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,var(--card),transparent);
  pointer-events:none;
}

/* BODY */
.news-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column;gap:7px;}
.news-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.news-src{font-size:.68rem;font-weight:800;padding:2px 9px;border-radius:10px;letter-spacing:.3px;}
.news-time{font-size:.68rem;color:var(--muted);}
.news-title{font-size:.9rem;font-weight:700;line-height:1.6;color:var(--text);}
/* 中文翻譯行 */
.news-cn{font-size:.8rem;color:var(--teal);line-height:1.55;font-weight:600;opacity:.92;padding:5px 9px;background:rgba(78,205,196,.06);border-left:2px solid rgba(78,205,196,.4);border-radius:0 6px 6px 0;}
.news-card.hero-card .news-title{font-size:1.05rem;}
.news-footer{margin-top:auto;padding-top:10px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.news-link{font-size:.75rem;font-weight:700;color:var(--teal);display:flex;align-items:center;gap:4px;}
.news-link::after{content:'→';transition:transform .2s;}
.news-card:hover .news-link::after{transform:translateX(3px);}
.news-num{font-size:.68rem;color:var(--muted);}

/* SKELETON */
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.skel-img{height:175px;background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-body{padding:14px 16px;}
.skel-line{height:10px;border-radius:5px;margin-bottom:10px;background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-line.s{width:40%;}.skel-line.m{width:65%;}.skel-line.f{width:92%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ERROR */
.err-box{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--muted);}
.err-icon{font-size:3.5rem;margin-bottom:14px;}
.retry-btn{margin-top:16px;padding:10px 26px;border-radius:20px;background:rgba(78,205,196,.12);border:1px solid var(--teal);color:var(--teal);font-size:.88rem;font-weight:700;cursor:pointer;transition:background .2s;}
.retry-btn:hover{background:rgba(78,205,196,.25);}

/* NO-IMAGE strip style */
.news-card.no-img{flex-direction:row;align-items:stretch;}
.news-card.no-img .news-body{padding:14px 16px;}

/* ── 橫滑導航列 ─────────────────────── */
.nav-links{display:flex;align-items:center;gap:4px;flex:1;overflow:hidden;}
@media(max-width:600px){
  nav{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;padding:0 8px;gap:4px;}
  nav::-webkit-scrollbar{display:none;}
  .nav-links{overflow:visible;flex:none;}
  .logo{font-size:.85rem;white-space:nowrap;flex-shrink:0;}
  .nav-a{flex-shrink:0;}
  .bg-switcher{gap:2px;margin-left:2px!important;margin-right:2px!important;flex-shrink:0;}
  .bg-picker-btn{width:22px;height:22px;}
  .theme-btn{flex-shrink:0;}
  .page-wrap{padding:68px 12px 40px;}
  .hero-title{font-size:1.4rem;}
  .hero-content{padding:24px 18px 20px;}
}
</style>
</head>
<canvas id="bgCanvas"></canvas>
<body>
<nav>
  <a class="logo" href="app.html">文武雙全</a>
  <div class="nav-links">
    <a class="nav-a" href="app.html">🏠 主頁</a>
    <a class="nav-a" href="english.html">📚 英文</a>
    <a class="nav-a" href="sports.html">🏆 體育</a>
    <a class="nav-a" href="tools.html">🎲 教具</a>
    <a class="nav-a active" href="news.html">📰 體壇動態</a>
  </div>
  <div class="bg-switcher" id="bgSwitcher" style="margin-left:auto;margin-right:8px;">
    <button class="bg-picker-btn active" data-bg="star"     data-label="✨ 星空流星" title="星空流星"></button>
    <button class="bg-picker-btn"        data-bg="geo"      data-label="⬡ 幾何網格" title="幾何網格"></button>
    <button class="bg-picker-btn"        data-bg="noise"    data-label="📄 噪點紙感" title="噪點紙感"></button>
    <button class="bg-picker-btn"        data-bg="mountain" data-label="🏔 視差山脈" title="視差山脈"></button>
    <button class="bg-picker-btn" id="bgCustomBtn" data-bg="custom" data-label="🖼 自定義圖片" title="自定義圖片" style="background:linear-gradient(135deg,#ff6b6b,#ffd700,#4ecdc4);font-size:13px;display:flex;align-items:center;justify-content:center;" onclick="bgCustomOpen()">🖼</button>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</nav>

<!-- 自定義圖片背景面板 -->
<div class="bg-custom-overlay" id="bgCustomOverlay" style="display:none;" onclick="if(event.target===this)bgCustomClose()">
  <div class="bg-custom-panel">
    <h3>🖼 自定義頁面背景</h3>
    <label class="bg-upload-zone" for="bgFileInput">
      <input type="file" id="bgFileInput" accept="image/*" onchange="bgHandleFile(this)">
      <div style="font-size:2rem;margin-bottom:8px;">📁</div>
      <div style="font-size:0.88rem;color:var(--muted,#888);">點擊選擇圖片（JPG / PNG / WebP）</div>
      <div style="font-size:0.75rem;color:var(--muted,#888);margin-top:4px;">建議解析度 1920×1080 或以上</div>
    </label>
    <div style="text-align:center;font-size:0.8rem;color:var(--muted,#888);margin:8px 0;">— 或貼上圖片網址 —</div>
    <input class="bg-url-inp" id="bgUrlInput" type="url" placeholder="https://... 圖片 URL">
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">

// ── 本地字典翻譯（備用）────────────────────────
function autoTranslate(title){
  if(!title) return '';
  let t = title;
  for(const [re, rep] of DICT) t = t.replace(re, rep);
  if(t === title) return '';
  const total = t.replace(/\s/g,'').length;
  const cnCount = (t.match(/[\u4e00-\u9fff\u3400-\u4dbf\uff00-\uffef]/g)||[]).length;
  return (cnCount/total) >= 0.20 ? t : '';
}

// ── Google 線上翻譯 ──────────────────────────────
const _gtCache = new Map();
async function googleTranslate(text){
  if(!text) return '';
  if(_gtCache.has(text)) return _gtCache.get(text);
  try{
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url, {signal: AbortSignal.timeout(5000)});
    const json = await res.json();
    const translated = json[0].map(x=>x[0]).join('');
    _gtCache.set(text, translated);
    return translated;
  } catch(e){
    return '';
  }
}

// ── 翻譯單張卡片（渲染後異步更新）──────────────
async function translateCard(el, title){
  const cnEl = el.querySelector('.news-cn');
  const result = await googleTranslate(title);
  if(!result || result === title) return;
  if(cnEl){
    cnEl.textContent = result;
    cnEl.style.display = '';
  } else {
    const titleEl = el.querySelector('.news-title');
    if(titleEl){
      const div = document.createElement('div');
      div.className = 'news-cn';
      div.textContent = result;
      titleEl.insertAdjacentElement('afterend', div);
    }
  }
}

// ── 工具 ────────────────────────────────────────
function relTime(pub){
  if(!pub) return '';
  // rss2json 返回的 pubDate 格式為 "2026-05-03 12:00:00"，無時區標識
  // 原始 RSS 時間為 UTC，需補上 Z 避免被當成本地時間（差 +8 小時）
  const normalized = pub.replace(' ','T').replace(/([^Z])$/,'$1Z');
  const d = new Date(normalized);
  if(isNaN(d)) return '';
  const s = (Date.now()-d)/1000;
  if(s<60)    return 'Just now';
  if(s<3600)  return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  if(s<172800)return 'Yesterday';
  return d.toLocaleDateString('en-GB',{month:'short',day:'numeric'});
}

function getThumb(item){
  if(item.thumbnail?.startsWith('http')) return item.thumbnail;
  if(item.enclosure?.type?.startsWith('image')) return item.enclosure.link;
  const html = item.content||item.description||'';
  const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
  return m ? m[1] : null;
}

// ── Fetch 全部 Feed ───────────────────────────────
async function fetchAll(){
  const results = await Promise.allSettled(
    FEED_URLS.map(({url,src,cls})=>
      fetch(API+encodeURIComponent(url),{signal:AbortSignal.timeout(9000)})
        .then(r=>r.json())
        .then(j=>(j.status==='ok'&&j.items)?j.items.map(i=>({...i,_src:src,_cls:cls})):[])
        .catch(()=>[])
    )
  );
  const seen=new Set(), merged=[];
  for(const r of results){
    if(r.status!=='fulfilled') continue;
    for(const item of r.value){
      const key=item.link||item.guid||item.title;
      if(!key||seen.has(key)) continue;
      seen.add(key);
      item._thumb = getThumb(item);
      merged.push(item);
    }
  }
  // 有圖片的排前，同組內按時間排
  merged.sort((a,b)=>{
    const ha = a._thumb?1:0, hb = b._thumb?1:0;
    if(ha!==hb) return hb-ha;
    const ta=a.pubDate?new Date(a.pubDate).getTime():0;
    const tb=b.pubDate?new Date(b.pubDate).getTime():0;
    return tb-ta;
  });
  return merged.length>0?merged:null;
}

// ── 渲染 ─────────────────────────────────────────
function renderPage(){
  const grid=document.getElementById('newsContainer');
  if(!allItems||allItems.length===0){
    grid.innerHTML=`<div class="err-box">
      <div class="err-icon">📡</div>
      <p style="font-size:.95rem">暫時無法載入新聞，請稍後重試</p>
      <button class="retry-btn" onclick="forceReload()">↻ 重新載入</button>
    </div>`;
    setStatus('載入失敗','0','');
    return;
  }
  const total=allItems.length;
  const start=pageIdx;
  const end=Math.min(start+PAGE,total);
  const show=allItems.slice(start,end);

  grid.innerHTML=show.map((item,idx)=>{
    const thumb=item._thumb;
    const imgHtml=thumb
      ? `<div class="news-img-wrap"><img class="news-thumb" src="${thumb}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=news-thumb-ph>🏆</div>'"></div>`
      : `<div class="news-thumb-ph">🏆</div>`;
    const time=relTime(item.pubDate);
    const link=item.link||item.guid||'#';
    const cn=autoTranslate(item.title||'');
    const isHero=idx===0?'hero-card':'';
    const noImg=!thumb?'no-img':'';
    const srcCls=item._cls||'src-other';
    return `
    <a class="news-card ${isHero} ${noImg}" href="${link}" target="_blank" rel="noopener"
       style="animation-delay:${idx*45}ms" data-title="${(item.title||'').replace(/"/g,'&quot;')}">
      ${imgHtml}
      <div class="news-body">
        <div class="news-meta">
          <span class="news-src ${srcCls}">${item._src||'Sport'}</span>
          ${time?`<span class="news-time">${time}</span>`:''}
        </div>
        <div class="news-title">${item.title||'(No title)'}</div>
        ${cn?`<div class="news-cn">${cn}</div>`:'<div class="news-cn" style="display:none"></div>'}
        <div class="news-footer">
          <span class="news-link">Read more →</span>
          <span class="news-num">${start+idx+1}/${total}</span>
        </div>
      </div>
    </a>`;
  }).join('');

  // 異步 Google 翻譯每張卡片標題
  grid.querySelectorAll('.news-card[data-title]').forEach(card=>{
    const title = card.getAttribute('data-title');
    if(!title) return;
    translateCard(card, title);
  });

  setStatus(`共 ${total} 篇 · 第 ${start+1}–${end} 篇`,`${end}/${total}`,`${Math.ceil(end/PAGE)}/${Math.ceil(total/PAGE)}`);
  const hasMore=end<total;
  document.getElementById('refreshLabel').textContent=hasMore?'下一批':'重新載入';
}

function setStatus(text,badge,page){
  document.getElementById('statusText').textContent=text;
  document.getElementById('countBadge').textContent=badge;
  if(page){
    document.getElementById('statTotal').textContent=allItems?.length||'—';
    document.getElementById('statPage').textContent=page;
  }
}

// ── 主載入 ────────────────────────────────────────
async function loadNews(){
  if(loading) return;
  loading=true;
  showSkeleton();
  allItems=await fetchAll();
  pageIdx=0;
  renderPage();
  loading=false;
}

function refreshTab(){
  const ri=document.getElementById('refreshBtn').querySelector('.ri');
  ri.style.animation='spin .6s linear';
  setTimeout(()=>ri.style.animation='',700);
  if(!allItems||!allItems.length){forceReload();return;}
  const next=pageIdx+PAGE;
  pageIdx=next>=allItems.length?0:next;
  renderPage();
  window.scrollTo({top:document.querySelector('.news-grid').offsetTop-80,behavior:'smooth'});
}

async function forceReload(){
  allItems=null; pageIdx=0;
  await loadNews();
}

    resize();
    let drawFn;
    if(name==='star') drawFn=bgStar();
    else if(name==='geo') drawFn=bgGeo();
    else if(name==='noise') drawFn=bgNoise();
    else if(name==='mountain') drawFn=bgMountain();
    if(drawFn) bgRaf=requestAnimationFrame(drawFn);
  };
  startBgCanvas(currentBg);
})();
applyBgTheme(currentBg);
// ── Theme ─────────────────────────────────────────
function applyTheme(m){
  document.body.classList.toggle('light-mode',m==='light');
  document.getElementById('themeBtn').textContent=m==='light'?'🌙':'☀️';
}
function toggleTheme(){
  const n=document.body.classList.contains('light-mode')?'dark':'light';
  localStorage.setItem('ssTheme',n); applyTheme(n);
}
applyTheme(localStorage.getItem('ssTheme')||'dark');

loadNews();
</script>
